<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Campus Placement System - Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#38bdf8,#1e293b);
}

.container{
    width:900px;
    height:560px;
    display:flex;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}

/* LEFT */

.left{
    width:45%;
    background:linear-gradient(to bottom,#2563eb,#1e3a8a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:30px;
    text-align:center;
}

.left i{
    font-size:90px;
    margin-bottom:20px;
}

.left h1{
    margin-bottom:15px;
}

.left p{
    line-height:1.7;
}

/* RIGHT */

.right{
    width:55%;
    padding:40px;
}

.right h2{
    text-align:center;
    color:#2563eb;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

input:focus,
select:focus{
    border:1px solid #2563eb;
}

.password-box{
    position:relative;
}

.password-box i{
    position:absolute;
    right:15px;
    top:15px;
    cursor:pointer;
    color:#555;
}

.btn{
    width:100%;
    padding:13px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
}

.btn:hover{
    background:#1d4ed8;
}

.link{
    margin-top:20px;
    text-align:center;
}

.link a{
    color:#2563eb;
    text-decoration:none;
    font-weight:bold;
}

.hidden{
    display:none;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:gray;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<div class="left">

<i class="fas fa-user-graduate"></i>

<h1>Smart Campus Placement</h1>

<p>

Welcome to the Campus Placement Portal.

Students, Recruiters, Companies and Administrators

can securely login and manage placements.

</p>

</div>

<div class="right">

<!-- LOGIN -->

<div id="loginBox">

<h2>Login</h2>

<div class="form-group">

<label>Select Role</label>

<select id="loginRole">

<option value="student">Student</option>

<option value="recruiter">Recruiter</option>

<option value="company">Company</option>

<option value="admin">Admin</option>

</select>

</div>

<div class="form-group">

<label>Username</label>

<input type="text"
id="loginUser"
placeholder="Enter Username">

</div>

<div class="form-group">

<label>Password</label>

<div class="password-box">

<input type="password"
id="loginPass"
placeholder="Enter Password">

<i class="fas fa-eye"
onclick="togglePassword('loginPass',this)"></i>

</div>

</div>

<button class="btn"
onclick="login()">

<i class="fas fa-sign-in-alt"></i>

Login

</button>

<div class="link">

Don't have an account?

<a href="#"
onclick="showRegister()">

Register

</a>

</div>

</div>

<!-- REGISTER -->

<div id="registerBox"
class="hidden">

<h2>Create Account</h2>

<div class="form-group">

<label>Select Role</label>

<select id="regRole">

<option value="student">Student</option>

<option value="recruiter">Recruiter</option>

<option value="company">Company</option>

<option value="admin">Admin</option>

</select>

</div>

<div class="form-group">

<label>Username</label>

<input type="text"
id="regUser"
placeholder="Create Username">

</div>

<div class="form-group">

<label>Password</label>

<div class="password-box">

<input type="password"
id="regPass"
placeholder="Create Password">

<i class="fas fa-eye"
onclick="togglePassword('regPass',this)"></i>

</div>

</div>

<button class="btn"
onclick="register()">

<i class="fas fa-user-plus"></i>

Register

</button>

<div class="link">

Already have an account?

<a href="#"
onclick="showLogin()">

Login

</a>

</div>

</div>

<div class="footer">

© 2024 Smart Campus Placement System

</div>

</div>

</div>

<!-- JavaScript Part 2 goes here -->
 <script>

// Show Register Form
function showRegister(){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("registerBox").classList.remove("hidden");
}

// Show Login Form
function showLogin(){
    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
}

// Show / Hide Password
function togglePassword(id, icon){
    let input = document.getElementById(id);

    if(input.type === "password"){
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    }else{
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

// Register
function register(){

    let role = document.getElementById("regRole").value;
    let user = document.getElementById("regUser").value.trim();
    let pass = document.getElementById("regPass").value.trim();

    if(user==="" || pass===""){
        alert("Please fill all fields!");
        return;
    }

    if(localStorage.getItem("user_"+user)){
        alert("Username already exists!");
        return;
    }

    localStorage.setItem("user_"+user, pass);
    localStorage.setItem("role_"+user, role);

    alert("Registration Successful!");

    showLogin();
}

// Login
function login(){

    let user = document.getElementById("loginUser").value.trim();
    let pass = document.getElementById("loginPass").value.trim();

    let storedPass = localStorage.getItem("user_"+user);

    if(storedPass === null){
        alert("User not found. Please Register First.");
        return;
    }

    if(pass !== storedPass){
        alert("Wrong Password!");
        return;
    }

    localStorage.setItem("loggedUser", user);

    alert("Login Successful!");

    window.location.href = "index.html";
}

</script>


</body>
</html>
