<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apply for Job</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f4f7fc;
      }

      .header {
        background: #1e293b;
        color: white;
        padding: 20px;
        text-align: center;
      }

      .container {
        width: 700px;
        margin: 40px auto;
      }

      .box {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      }

      .box h2 {
        text-align: center;
        color: #2563eb;
        margin-bottom: 25px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        font-size: 15px;
      }

      input:focus,
      textarea:focus {
        border-color: #2563eb;
      }

      textarea {
        height: 120px;
        resize: none;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #1d4ed8;
      }

      .back {
        margin-top: 20px;
        text-align: center;
      }

      .back a {
        text-decoration: none;
        color: #2563eb;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>Smart Campus Placement System</h1>
    </div>

    <div class="container">
      <div class="box">
        <h2><i class="fa-solid fa-paper-plane"></i> Apply for Job</h2>

        <div class="form-group">
          <label>Student Name</label>
          <input type="text" id="name" placeholder="Enter your name" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="phone" placeholder="Enter phone number" />
        </div>

        <div class="form-group">
          <label>Company Name</label>
          <input type="text" id="company" placeholder="Enter company name" />
        </div>

        <div class="form-group">
          <label>Job Role</label>
          <input type="text" id="role" placeholder="Enter job role" />
        </div>

        <div class="form-group">
          <label>Skills</label>
          <input type="text" id="skills" placeholder="Java, Python, React..." />
        </div>

        <div class="form-group">
          <label>Upload Resume</label>
          <input type="file" id="resume" accept=".pdf,.doc,.docx" />
        </div>

        <div class="form-group">
          <label>About Yourself</label>
          <textarea
            id="about"
            placeholder="Tell us about yourself..."
          ></textarea>
        </div>

        <button onclick="applyJob()">
          <i class="fa-solid fa-paper-plane"></i>
          Apply Now
        </button>

        <div class="back">
          <a href="../jobs.html">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Jobs
          </a>
        </div>
      </div>
    </div>

    <script>
      function applyJob() {
        fetch("http://localhost:5000/api/apply", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            studentName: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            company: document.getElementById("company").value,
            jobRole: document.getElementById("role").value,
            skills: document.getElementById("skills").value,
            about: document.getElementById("about").value,
          }),
        })
          .then((res) => res.json())

          .then((data) => {
            alert(data.message);
          })

          .catch((err) => {
            console.log(err);
          });
      }
    </script>
  </body>
</html>
